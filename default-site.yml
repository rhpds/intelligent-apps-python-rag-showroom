---
site:
  title: Building Intelligent Applications with Python and RAG Lab
  url: https://github.com/rhpds/showroom-intelligent-apps-rag
  start_page: modules::index.adoc

content:
  sources:
    - url: .
      start_path: content

ui:
  bundle:
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/rh-one-2025/ui-bundle.zip
    snapshot: true
  supplemental_files: ./content/supplemental-ui

runtime:
  cache_dir: ./.cache/antora

antora:
  extensions:
    - require: ./content/lib/dev-mode.js
      enabled: true
    - id: ai-assistant-build
      require: ./content/lib/ai-assistant-build.js
      enabled: true
    - id: rag-export
      require: ./content/lib/rag-export.js
      enabled: true

output:
  dir: ./www
