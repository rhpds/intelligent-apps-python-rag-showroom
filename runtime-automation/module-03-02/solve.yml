---
# SOLVE — 3.2 Tracing the Event-Driven Pipeline
# Task 1: Upload a PDF to the user's MinIO bucket via S3 API
# Task 2: Verify event-bridge received the event
# Task 3: Verify Knative trigger is ready
# Task 4: Verify kfp-s3-trigger processed the event
#
# The student uploads a PDF via the MinIO web console. We automate
# this using the MinIO S3 API from within the minio pod.

- name: Module 03-02 Solve — Trace Event-Driven Pipeline
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ns: "{{ user }}"
    minio_ns: "minio"
    event_ns: "rag-pipeline-workshop"
    bucket_name: "{{ user }}-pdf-inbox"
  tasks:

    # ── Task 1: Get the example PDF from the workbench ─────────────────────────
    - name: Copy example PDF from workbench to runner
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        cp {{ ns }}/my-workbench-0:/opt/app-root/src/hello-chris-rag-pipeline/scripts/example.pdf
        /tmp/example.pdf
        -c my-workbench
      ignore_errors: true

    # ── Task 2: Upload PDF to MinIO via S3 API ────────────────────────────────
    - name: Upload PDF to MinIO user bucket via mc in minio pod
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        exec deploy/minio -n {{ minio_ns }}
        -- bash -c "
        mc alias set local http://localhost:9000 minio minio123 --api S3v4 2>/dev/null;
        mc cp /dev/stdin local/{{ bucket_name }}/example-solve.pdf
        " < /tmp/example.pdf
      register: r_upload
      ignore_errors: true

    # ── Task 3: Check event-bridge logs ────────────────────────────────────────
    - name: Check minio-event-bridge logs
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        logs -n {{ event_ns }} -l app=minio-event-bridge --tail=20
      register: r_bridge_logs
      ignore_errors: true

    - name: Display event-bridge logs
      ansible.builtin.debug:
        msg: "{{ r_bridge_logs.stdout_lines | default([]) | last | default('no logs') }}"

    # ── Task 4: Check Knative trigger ──────────────────────────────────────────
    - name: Check Knative trigger status
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        get trigger minio-pdf-event-trigger -n {{ event_ns }}
        -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: r_trigger
      ignore_errors: true

    # ── Task 5: Check kfp-s3-trigger logs ──────────────────────────────────────
    - name: Check kfp-s3-trigger logs
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        logs -n {{ event_ns }}
        -l serving.knative.dev/service=kfp-s3-trigger
        -c user-container --tail=30
      register: r_trigger_logs
      ignore_errors: true

    - name: Display kfp-s3-trigger logs
      ansible.builtin.debug:
        msg: "{{ r_trigger_logs.stdout_lines | default([]) | last | default('no logs') }}"

    # ── Report ─────────────────────────────────────────────────────────────────
    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          PDF upload to {{ bucket_name }}: {{ 'ok' if r_upload.rc | default(1) == 0 else 'FAILED' }}
          Event-bridge logs: {{ 'found' if r_bridge_logs.stdout | default('') | length > 0 else 'empty' }}
          Knative trigger ready: {{ 'True' if r_trigger.stdout | default('') == 'True' else r_trigger.stdout | default('unknown') }}
