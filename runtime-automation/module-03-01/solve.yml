---
# SOLVE — 3.1 Setup & Pipeline Import (Event-Driven)
# Task 1: Import simple-pdf-processing-pipeline via KFP API
#
# The student downloads simple-pdf-processing-pipeline.yaml from
# the workbench and imports it via the RHOAI Dashboard UI.
# The pipeline name must match exactly for the event trigger to find it.

- name: Module 03-01 Solve — Event-Driven Pipeline Import
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ns: "{{ user }}"
    pipeline_name: "simple-pdf-processing-pipeline"
    pipeline_file: "/opt/app-root/src/hello-chris-rag-pipeline/lab-content/2.1/simple-pdf-processing-pipeline.yaml"
  tasks:

    # ── Task 1: Get SA token ───────────────────────────────────────────────────
    - name: Create SA token for pipeline access
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        create token pipeline -n {{ ns }}
      register: r_token

    # ── Task 2: Check if pipeline already exists ───────────────────────────────
    - name: Check if pipeline already imported
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        exec deploy/ds-pipeline-dspa -n {{ ns }}
        -c ds-pipeline-api-server --
        curl -sk -H "Authorization: Bearer {{ r_token.stdout }}"
        https://localhost:8443/apis/v2beta1/pipelines
      register: r_pipelines

    - name: Check if PDF pipeline exists
      ansible.builtin.set_fact:
        _pipeline_exists: "{{ pipeline_name in r_pipelines.stdout }}"

    # ── Task 3: Copy pipeline YAML from workbench and upload ───────────────────
    - name: Copy pipeline YAML from workbench pod to tmp
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        cp {{ ns }}/my-workbench-0:{{ pipeline_file }}
        /tmp/simple-pdf-processing-pipeline.yaml
        -c my-workbench
      when: not _pipeline_exists

    - name: Copy pipeline YAML into DSPA pod
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        cp /tmp/simple-pdf-processing-pipeline.yaml
        {{ ns }}/$(oc --kubeconfig={{ k8s_kubeconfig }} get pod -n {{ ns }} -l app=ds-pipeline-dspa -o jsonpath='{.items[0].metadata.name}'):/tmp/simple-pdf-processing-pipeline.yaml
        -c ds-pipeline-api-server
      when: not _pipeline_exists

    - name: Upload pipeline via KFP API
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        exec deploy/ds-pipeline-dspa -n {{ ns }}
        -c ds-pipeline-api-server --
        curl -sk
        -H "Authorization: Bearer {{ r_token.stdout }}"
        -F "uploadfile=@/tmp/simple-pdf-processing-pipeline.yaml"
        -F "name={{ pipeline_name }}"
        https://localhost:8443/apis/v2beta1/pipelines/upload
      register: r_upload
      when: not _pipeline_exists

    # ── Report ─────────────────────────────────────────────────────────────────
    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          Pipeline "{{ pipeline_name }}": {{ 'already exists (skipped)' if _pipeline_exists else ('uploaded — ' + (r_upload.stdout | default(''))[:100]) }}
