---
# SOLVE — 2.5 Importing the Data Science Pipeline
# Task 1: Upload pipeline YAML to DSPA via KFP v2 API
#
# The student downloads api_to_milvus_pipeline.yaml from the workbench
# and imports it via the RHOAI Dashboard UI. We automate this by exec'ing
# into the workbench pod (which has both the file and curl) and uploading
# to the DSPA internal service.
#
# Key: the upload API name query param must be lowercase slug.
# DSPA pod lacks tar so oc cp into it fails — use workbench pod instead.

- name: Module 02-05 Solve — Import Pipeline
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ns: "{{ user }}"
    pipeline_slug: "servicenow-ticket-ingestion"
    pipeline_file: "/opt/app-root/src/hello-chris-rag-pipeline/lab-content/3.5/api_to_milvus_pipeline.yaml"
    dspa_svc: "https://ds-pipeline-dspa.{{ user }}.svc.cluster.local:8443"
  tasks:

    # ── Task 1: Get SA token for DSPA API ──────────────────────────────────────
    - name: Create SA token for pipeline access
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        create token pipeline -n {{ ns }}
      register: r_token

    # ── Task 2: Check if pipeline already exists ───────────────────────────────
    - name: Check if pipeline already imported
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        exec my-workbench-0 -n {{ ns }}
        -c my-workbench --
        curl -sk -H "Authorization: Bearer {{ r_token.stdout }}"
        {{ dspa_svc }}/apis/v2beta1/pipelines
      register: r_pipelines

    - name: Check if ServiceNow pipeline exists
      ansible.builtin.set_fact:
        _pipeline_exists: >-
          {{ (pipeline_slug in r_pipelines.stdout) or
             ('ServiceNow Ticket Ingestion' in r_pipelines.stdout) }}

    # ── Task 3: Upload pipeline from workbench pod ─────────────────────────────
    # The workbench pod has both the YAML file and curl. The DSPA pod lacks tar
    # so oc cp into it fails. Upload uses name as query param (must be slug).
    - name: Upload pipeline via KFP API from workbench pod
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        exec my-workbench-0 -n {{ ns }}
        -c my-workbench --
        curl -sk
        -H "Authorization: Bearer {{ r_token.stdout }}"
        -F "uploadfile=@{{ pipeline_file }};type=application/x-yaml"
        "{{ dspa_svc }}/apis/v2beta1/pipelines/upload?name={{ pipeline_slug }}&description=A+pipeline+to+fetch+closed+ServiceNow+incidents+and+ingest+them+into+a+Milvus+vector+database."
      register: r_upload
      when: not _pipeline_exists

    - name: Verify upload succeeded
      ansible.builtin.assert:
        that:
          - "'pipeline_id' in r_upload.stdout"
        fail_msg: "Pipeline upload failed: {{ r_upload.stdout }}"
      when: not _pipeline_exists

    # ── Report ─────────────────────────────────────────────────────────────────
    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          Pipeline "{{ pipeline_slug }}": {{ 'already exists (skipped)' if _pipeline_exists else ('uploaded — ' + (r_upload.stdout | default(''))[:100]) }}
