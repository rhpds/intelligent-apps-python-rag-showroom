---
# SOLVE — 2.5 Importing the Data Science Pipeline
# Task 1: Copy pipeline YAML from workbench pod
# Task 2: Upload pipeline to DSPA via KFP API
#
# The student downloads api_to_milvus_pipeline.yaml from the workbench
# and imports it via the RHOAI Dashboard UI. We automate this via the
# KFP v2 API on the DSPA service.

- name: Module 02-05 Solve — Import Pipeline
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ns: "{{ user }}"
    pipeline_name: "ServiceNow Ticket Ingestion"
    pipeline_file: "/opt/app-root/src/hello-chris-rag-pipeline/lab-content/3.5/api_to_milvus_pipeline.yaml"
  tasks:

    # ── Task 1: Get SA token for DSPA API ──────────────────────────────────────
    - name: Create SA token for pipeline access
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        create token pipeline -n {{ ns }}
      register: r_token

    # ── Task 2: Check if pipeline already exists ───────────────────────────────
    - name: Check if pipeline already imported
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        exec deploy/ds-pipeline-dspa -n {{ ns }}
        -c ds-pipeline-api-server --
        curl -sk -H "Authorization: Bearer {{ r_token.stdout }}"
        https://localhost:8443/apis/v2beta1/pipelines
      register: r_pipelines

    - name: Check if ServiceNow pipeline exists
      ansible.builtin.set_fact:
        _pipeline_exists: "{{ 'ServiceNow Ticket Ingestion' in r_pipelines.stdout }}"

    # ── Task 3: Copy pipeline YAML from workbench and upload ───────────────────
    - name: Copy pipeline YAML from workbench pod to tmp
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        cp {{ ns }}/my-workbench-0:{{ pipeline_file }}
        /tmp/api_to_milvus_pipeline.yaml
        -c my-workbench
      when: not _pipeline_exists

    - name: Copy pipeline YAML into DSPA pod
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        cp /tmp/api_to_milvus_pipeline.yaml
        {{ ns }}/$(oc --kubeconfig={{ k8s_kubeconfig }} get pod -n {{ ns }} -l app=ds-pipeline-dspa -o jsonpath='{.items[0].metadata.name}'):/tmp/api_to_milvus_pipeline.yaml
        -c ds-pipeline-api-server
      when: not _pipeline_exists

    - name: Upload pipeline via KFP API
      ansible.builtin.shell: >-
        oc --kubeconfig={{ k8s_kubeconfig }}
        exec deploy/ds-pipeline-dspa -n {{ ns }}
        -c ds-pipeline-api-server --
        curl -sk
        -H "Authorization: Bearer {{ r_token.stdout }}"
        -F "uploadfile=@/tmp/api_to_milvus_pipeline.yaml"
        -F "name={{ pipeline_name }}"
        -F "description=A pipeline to fetch closed ServiceNow incidents and ingest them into a Milvus vector database."
        https://localhost:8443/apis/v2beta1/pipelines/upload
      register: r_upload
      when: not _pipeline_exists

    # ── Report ─────────────────────────────────────────────────────────────────
    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          Pipeline "{{ pipeline_name }}": {{ 'already exists (skipped)' if _pipeline_exists else ('uploaded — ' + (r_upload.stdout | default(''))[:100]) }}
